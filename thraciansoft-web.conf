server {
    listen 80;
    listen 443 ssl default_server;
    server_name thraciansoft.xyz www.thraciansoft.xyz;

    ssl_certificate /etc/letsencrypt/live/thraciansoft.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thraciansoft.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
